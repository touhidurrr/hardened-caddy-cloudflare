name: Check lastest version & update versions.env

on:
  push:
    branches:
      - main
    paths:
      - scripts/checkLatest.ts
      - .github/workflows/check_latest.yml
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check-latest:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --production --frozen-lockfile

      - name: Check and Update Version
        id: check
        run: bun check

      - name: Commit
        run: |
          git config --global user.name 'Md. Touhidur Rahman'
          git config --global user.email 'touhidurrr@pm.me'
          git add versions.env
          git commit -m "Update Caddy Version to ${{ steps.check.outputs.VERSION }}"
          git push

  publish:
    needs: check-latest
    uses: ./.github/workflows/publish.yml
